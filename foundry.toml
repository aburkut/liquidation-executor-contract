[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "shanghai"
optimizer = true
# optimizer_runs = 1 biases toward smaller runtime code (fewer inlined copies
# of internal functions). Callers pay slightly more gas per call but the
# deployed contract stays under EIP-170 (24,576 bytes).
optimizer_runs = 1
via_ir = true
# Strip cbor metadata suffix (~53 bytes) from runtime bytecode — keeps the
# deployed contract comfortably under the EIP-170 24,576-byte limit.
bytecode_hash = "none"
cbor_metadata = false

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]
